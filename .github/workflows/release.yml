name: Release

on:
  push:
    tags: ["v*"]
  # Dry run: builds every artifact but skips the release job below.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-web

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build browser engine
        run: ./scripts/build-web-wasm.sh

      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm run typecheck
          npm test -- --run
          npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: seed-seeker-web-dist
          path: web/dist
          if-no-files-found: error

  web-deploy:
    name: Deploy web
    needs: web
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: seed-seeker-web-dist
          path: web/dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: shpd-seed-seeker

  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
          # Cross-compiled; Apple hosts carry both darwin toolchains.
          - target: x86_64-apple-darwin
            runner: macos-15
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --locked -p shpd-seedfinder-cli --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf "seed-seeker-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" seed-seeker

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/seed-seeker.exe" `
            -DestinationPath "seed-seeker-cli-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: seed-seeker-cli-*
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # Signing activates once the repository secrets exist; without them the
    # release ships the unsigned APK.
    env:
      HAVE_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE != '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-android

      # Must match ndkVersion in android/app/build.gradle.kts. The runner
      # image exports ANDROID_NDK_HOME pointing at its bundled NDK, so it has
      # to be repointed or scripts/build-android-native.sh links with the
      # wrong toolchain.
      - name: Install Android NDK
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Tests and lint run in CI; releases only assemble.
      - name: Assemble release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease --stacktrace

      # Must match the apksigner example in the README's Android section.
      - name: Sign APK
        if: env.HAVE_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "build-tools;36.1.0"
          KEYSTORE="$RUNNER_TEMP/release-keystore"
          echo "$ANDROID_KEYSTORE" | base64 --decode > "$KEYSTORE"
          "$ANDROID_HOME/build-tools/36.1.0/apksigner" sign \
            --ks "$KEYSTORE" --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --out "seed-seeker-${{ github.ref_name }}-android.apk" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$ANDROID_HOME/build-tools/36.1.0/apksigner" verify --print-certs \
            "seed-seeker-${{ github.ref_name }}-android.apk"
          rm "$KEYSTORE"

      - name: Stage unsigned APK
        if: env.HAVE_KEYSTORE != 'true'
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "seed-seeker-${{ github.ref_name }}-android-unsigned.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: seed-seeker-*-android*.apk
          if-no-files-found: error

  macos-app:
    name: macOS app
    # The linked SDK gates the system appearance; macos-26 ships the current
    # one. Keep in sync with the CI macos job.
    runs-on: macos-26
    timeout-minutes: 30

    # Signing/notarization activates once the repository secrets exist;
    # without them the build falls back to the ad-hoc signature. Sparkle
    # updates likewise activate once the EdDSA key pair exists: generate it
    # with Sparkle's `generate_keys -x key.txt` and store the printed public
    # key as SPARKLE_PUBLIC_ED_KEY and the exported file's contents as
    # SPARKLE_ED_PRIVATE_KEY. Without them the app ships without an update
    # feed and its "Check for Updates" menu item stays disabled.
    env:
      HAVE_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}
      HAVE_NOTARY: ${{ secrets.NOTARY_KEY != '' }}
      HAVE_SPARKLE: ${{ secrets.SPARKLE_ED_PRIVATE_KEY != '' && secrets.SPARKLE_PUBLIC_ED_KEY != '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-app

      - name: Import Developer ID certificate
        if: env.HAVE_CERT == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERT_P12" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$CERT"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity in the imported certificate"
            exit 1
          fi
          echo "MACOS_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build app bundle
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: bash scripts/build-macos-app.sh

      - name: Package dmg
        run: |
          bash scripts/package-macos-dmg.sh \
            "seed-seeker-${{ github.ref_name }}-macos-arm64.dmg"

      # Submitting the dmg notarizes every nested binary in one pass; the
      # stapled ticket on the dmg then covers the app it contains.
      - name: Notarize and staple
        if: env.HAVE_CERT == 'true' && env.HAVE_NOTARY == 'true'
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          KEY="$RUNNER_TEMP/notary-key.p8"
          echo "$NOTARY_KEY" > "$KEY"
          xcrun notarytool submit "seed-seeker-${{ github.ref_name }}-macos-arm64.dmg" \
            --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple "seed-seeker-${{ github.ref_name }}-macos-arm64.dmg"
          rm "$KEY"

      # The appcast is generated from the final (stapled) dmg bytes because
      # its EdDSA signature covers the archive exactly as users download it.
      # It is published as a release asset, and the app's SUFeedURL always
      # points at the copy attached to the latest release.
      - name: Generate Sparkle appcast
        if: env.HAVE_SPARKLE == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          SPARKLE_VERSION=2.9.4
          curl -fsSL -o "$RUNNER_TEMP/sparkle-tools.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle-tools"
          tar -xJf "$RUNNER_TEMP/sparkle-tools.tar.xz" -C "$RUNNER_TEMP/sparkle-tools"
          KEY_FILE="$RUNNER_TEMP/sparkle-ed-key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          mkdir "$RUNNER_TEMP/appcast"
          cp "seed-seeker-${{ github.ref_name }}-macos-arm64.dmg" "$RUNNER_TEMP/appcast/"
          "$RUNNER_TEMP/sparkle-tools/bin/generate_appcast" \
            --ed-key-file "$KEY_FILE" \
            --download-url-prefix "https://github.com/akhial/shpd-seed-seeker/releases/download/${{ github.ref_name }}/" \
            --link "https://github.com/akhial/shpd-seed-seeker/releases" \
            -o appcast.xml "$RUNNER_TEMP/appcast"
          rm "$KEY_FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            seed-seeker-*-macos-arm64.dmg
            appcast.xml
          if-no-files-found: error

  linux-appimage:
    name: Linux AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ubuntu:24.04
    timeout-minutes: 60

    env:
      APPIMAGE_GTK_PREFIX: /tmp/seed-seeker-appimage/gtk
      APPIMAGE_GTK_BUILD_ROOT: /tmp/seed-seeker-appimage/build
      APPIMAGE_SOURCE_CACHE: /tmp/seed-seeker-appimage/sources

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            adwaita-icon-theme appstream build-essential ca-certificates curl file git \
            gsettings-desktop-schemas hicolor-icon-theme ninja-build pkg-config xz-utils \
            bison flex gettext gperf python3-jinja2 python3-packaging python3-pip sassc \
            libappstream-dev libdbus-1-dev libdrm-dev libegl-dev libepoxy-dev libffi-dev \
            libfontconfig1-dev libfreetype-dev libfribidi-dev libgdk-pixbuf-2.0-dev \
            libgl-dev libgraphene-1.0-dev libjpeg-dev libmount-dev libpcre2-dev \
            libpixman-1-dev libpng-dev libselinux1-dev libthai-dev libtiff-dev \
            libxml2-dev \
            libx11-dev libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxrender-dev libxtst-dev

          # GTK 4.22 requires Meson 1.5+, while Ubuntu 24.04 ships 1.3.
          python3 -m pip install --break-system-packages --no-cache-dir meson==1.7.2

      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux-appimage-${{ matrix.arch }}

      - name: Build portable GTK stack
        run: bash scripts/build-linux-gtk-stack.sh

      - name: Build AppImage
        env:
          APPIMAGE_VERSION: ${{ github.ref_name }}
        run: bash scripts/build-linux-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: dist/*.AppImage
          if-no-files-found: error

  windows-app:
    name: Windows app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: ARM64
            rid: win-arm64
            rust-target: aarch64-pc-windows-msvc
            runner: windows-11-arm
          - arch: x64
            platform: x64
            rid: win-x64
            rust-target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-app-${{ matrix.arch }}

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      # The csproj builds and copies the Rust engine DLL itself.
      - name: Build app
        run: pwsh scripts/build-windows-app.ps1 -Platform ${{ matrix.platform }}

      # Resolve the output directory instead of hard-coding the
      # bin/<platform>/<config>/<tfm>/<rid> segments, which shift with SDK
      # and target-framework updates.
      - name: Package app
        shell: pwsh
        run: |
          $out = Get-ChildItem -Path windows/SeedSeeker/bin -Recurse -Directory -Filter ${{ matrix.rid }} |
            Where-Object { $_.FullName -match 'Release' } | Select-Object -First 1
          if (-not $out) { throw "${{ matrix.rid }} Release output directory not found" }
          Compress-Archive -Path "$($out.FullName)/*" `
            -DestinationPath "seed-seeker-${{ github.ref_name }}-windows-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-${{ matrix.arch }}
          path: seed-seeker-*-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [cli, android, macos-app, linux-appimage, windows-app]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # Exclude the web build; it deploys to Firebase and is not a release asset.
          pattern: '!seed-seeker-web-dist'
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
