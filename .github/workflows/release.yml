name: Release

on:
  push:
    tags: ["v*"]
  # Dry run: builds every artifact but skips the release job below.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
          # Cross-compiled; Apple hosts carry both darwin toolchains.
          - target: x86_64-apple-darwin
            runner: macos-15
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --locked -p shpd-seedfinder-cli --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf "seed-seeker-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" seed-seeker

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/seed-seeker.exe" `
            -DestinationPath "seed-seeker-cli-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: seed-seeker-cli-*
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-android

      # Must match ndkVersion in android/app/build.gradle.kts. The runner
      # image exports ANDROID_NDK_HOME pointing at its bundled NDK, so it has
      # to be repointed or scripts/build-android-native.sh links with the
      # wrong toolchain.
      - name: Install Android NDK
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Tests and lint run in CI; releases only assemble.
      - name: Assemble release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Stage APK
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "seed-seeker-${{ github.ref_name }}-android-unsigned.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: seed-seeker-*-android-unsigned.apk
          if-no-files-found: error

  macos-app:
    name: macOS app
    # The linked SDK gates the system appearance; macos-26 ships the current
    # one. Keep in sync with the CI macos job.
    runs-on: macos-26
    timeout-minutes: 30

    # Signing/notarization activates once the repository secrets exist;
    # without them the build falls back to the ad-hoc signature.
    env:
      HAVE_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}
      HAVE_NOTARY: ${{ secrets.NOTARY_KEY != '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-app

      - name: Import Developer ID certificate
        if: env.HAVE_CERT == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERT_P12" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$CERT"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity in the imported certificate"
            exit 1
          fi
          echo "MACOS_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: bash scripts/build-macos-app.sh

      - name: Notarize and staple
        if: env.HAVE_CERT == 'true' && env.HAVE_NOTARY == 'true'
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          KEY="$RUNNER_TEMP/notary-key.p8"
          echo "$NOTARY_KEY" > "$KEY"
          ditto -c -k --keepParent "dist/Seed Seeker.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple "dist/Seed Seeker.app"
          rm "$KEY"

      # ditto preserves the code signature, notarization ticket, and bundle
      # metadata that a plain zip would strip.
      - name: Package app
        run: |
          ditto -c -k --keepParent "dist/Seed Seeker.app" \
            "seed-seeker-${{ github.ref_name }}-macos-arm64.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: seed-seeker-*-macos-arm64.app.zip
          if-no-files-found: error

  windows-app:
    name: Windows app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: ARM64
            rid: win-arm64
            rust-target: aarch64-pc-windows-msvc
            runner: windows-11-arm
          - arch: x64
            platform: x64
            rid: win-x64
            rust-target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-app-${{ matrix.arch }}

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      # The csproj builds and copies the Rust engine DLL itself.
      - name: Build app
        run: pwsh scripts/build-windows-app.ps1 -Platform ${{ matrix.platform }}

      # Resolve the output directory instead of hard-coding the
      # bin/<platform>/<config>/<tfm>/<rid> segments, which shift with SDK
      # and target-framework updates.
      - name: Package app
        shell: pwsh
        run: |
          $out = Get-ChildItem -Path windows/SeedSeeker/bin -Recurse -Directory -Filter ${{ matrix.rid }} |
            Where-Object { $_.FullName -match 'Release' } | Select-Object -First 1
          if (-not $out) { throw "${{ matrix.rid }} Release output directory not found" }
          Compress-Archive -Path "$($out.FullName)/*" `
            -DestinationPath "seed-seeker-${{ github.ref_name }}-windows-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-${{ matrix.arch }}
          path: seed-seeker-*-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [cli, android, macos-app, windows-app]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
