name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test workspace
        run: cargo test --locked --workspace

      - name: Lint workspace
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test, lint, and assemble release
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleRelease --stacktrace

  macos:
    name: macOS
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos

      - name: Build native library
        run: cargo build --locked --release --target aarch64-apple-darwin -p shpd-seedfinder-ffi

      - name: Test Swift package
        working-directory: macos/SeedSeeker
        run: swift test
