name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Keep main's history complete; only supersede pull request builds.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --locked --workspace

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android

      # Must match ndkVersion in android/app/build.gradle.kts. The runner
      # image exports ANDROID_NDK_HOME pointing at its bundled NDK, so it has
      # to be repointed or scripts/build-android-native.sh links with the
      # wrong toolchain.
      - name: Install Android NDK
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test, lint, and assemble release
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleRelease --stacktrace

  macos:
    name: macOS
    # Matches the release macos-app job so tests exercise the shipping SDK.
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos

      - name: Build native library
        run: bash scripts/build-macos-native.sh

      - name: Test Swift package
        working-directory: macos/SeedSeeker
        run: swift test

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Test workspace
        run: cargo test --locked --workspace

      # The csproj builds and copies the Rust engine DLL itself.
      - name: Build app
        run: pwsh scripts/build-windows-app.ps1 -Platform x64
