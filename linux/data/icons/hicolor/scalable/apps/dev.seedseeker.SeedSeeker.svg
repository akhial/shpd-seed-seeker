<!-- Seed Seeker abstract mark: three arcs brighten as they converge on the
     amber seed. Scaled from the shared master assets/icon/seed-seeker-square.svg. -->
<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2c29"/>
      <stop offset="1" stop-color="#0b1110"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffc96b" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#ffc96b" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffc96b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#ffe3a8"/>
      <stop offset="1" stop-color="#ffc96b"/>
    </radialGradient>
  </defs>
  <rect width="108" height="108" rx="24" fill="url(#bg)"/>
  <g transform="translate(54 54)" fill="none" stroke-linecap="round">
    <circle r="31.6" stroke="#35906f" stroke-width="6.1"
            stroke-dasharray="157.4 41.4" transform="rotate(-30)"/>
    <circle r="21.7" stroke="#4fb88c" stroke-width="6.1"
            stroke-dasharray="89.1 47.4" transform="rotate(90)"/>
    <circle r="12.4" stroke="#7de2b8" stroke-width="5.9"
            stroke-dasharray="40.2 38.0" transform="rotate(210)"/>
    <circle r="15.8" fill="url(#glow)" stroke="none"/>
    <circle r="5.7" fill="url(#dot)" stroke="none"/>
  </g>
</svg>
