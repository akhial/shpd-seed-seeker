<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 216" width="780" height="216" role="img">
  <title>Bar chart of seed-search throughput: Seed Seeker tests 13,716 seeds per second on 12 cores and 1,567 on one core; the Java shpd-seed-finder tests 453 seeds per second across 6 processes and 94 in one process.</title>

  <style>
    @font-face {
      font-family: 'Space Grotesk';
      font-weight: 300 700;
      src: url(data:font/woff2;base64,) format('woff2');
    }
    text {
      font-family: 'Space Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .label { fill: #52514e; }
    .value { fill: #0b0b0b; font-weight: 600; }
    .ours { font-weight: 700; }
    .baseline { stroke: #e1e0d9; stroke-width: 1; }
    .bar-ours { fill: #2a78d6; }
    .bar-theirs { fill: #1baf7a; }
    @media (prefers-color-scheme: dark) {
      .label { fill: #c3c2b7; }
      .value { fill: #ffffff; }
      .baseline { stroke: #2c2c2a; }
      .bar-ours { fill: #3987e5; }
      .bar-theirs { fill: #199e70; }
    }
  </style>

  <!-- baseline -->
  <line class="baseline" x1="221.5" y1="14" x2="221.5" y2="202"/>

  <!-- Seed Seeker · 12 threads -->
  <text class="label ours" x="210" y="34" text-anchor="end">Seed Seeker (12 threads)</text>
  <path class="bar-ours" d="M222 20 h438 q2 0 2 2 v16 q0 2 -2 2 h-438 z"/>
  <text class="value ours" x="670" y="34">13,716 seeds/s</text>

  <!-- Seed Seeker · 1 thread -->
  <text class="label ours" x="210" y="82" text-anchor="end">Seed Seeker (1 thread)</text>
  <path class="bar-ours" d="M222 68 h50 q2 0 2 2 v16 q0 2 -2 2 h-50 z"/>
  <text class="value ours" x="282" y="82">1,567</text>

  <!-- shpd-seed-finder · 6 processes -->
  <text class="label" x="210" y="130" text-anchor="end">shpd-seed-finder (6 processes)</text>
  <path class="bar-theirs" d="M222 116 h14.5 q2 0 2 2 v16 q0 2 -2 2 h-14.5 z"/>
  <text class="value" x="247" y="130">453</text>

  <!-- shpd-seed-finder · 1 process -->
  <text class="label" x="210" y="178" text-anchor="end">shpd-seed-finder (1 process)</text>
  <path class="bar-theirs" d="M222 164 h3 q2 0 2 2 v16 q0 2 -2 2 h-3 z"/>
  <text class="value" x="235" y="178">94</text>
</svg>
